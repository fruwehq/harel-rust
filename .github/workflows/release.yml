name: release

# Publish the determa-state crate to crates.io. Fires on a v* tag; also
# manually dispatchable (used for the first publish, since the v0.0.5 tag
# predates this workflow).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  crates:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # OIDC for crates.io Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
