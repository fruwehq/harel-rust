name: release

# Publish the determa-state crate to crates.io. Fires on a v* tag; also
# manually dispatchable (used for the first publish, since the v0.0.5 tag
# predates this workflow). Requires the CARGO_REGISTRY_TOKEN org secret.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  crates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish to crates.io
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
